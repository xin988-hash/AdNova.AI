<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 AdNova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-right mb-3"><select id="language-switcher" class="border rounded-lg px-3 py-2 text-sm"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div>
    <div class="bg-white rounded-2xl shadow p-8">
      <h1 class="text-2xl font-bold text-center" data-i18n="title">创建 AdNova 账号</h1>
      <p class="text-slate-600 text-center mt-2" data-i18n="subtitle">只需一分钟，马上开始 AI 广告增长</p>
      <div id="error-box" class="hidden mt-4 rounded-lg bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm"></div>
      <form id="register-form" class="space-y-4 mt-6">
        <div><label class="text-sm font-medium" data-i18n="email">邮箱</label><input id="email" type="email" class="w-full border rounded-lg px-3 py-2 mt-1" data-i18n-placeholder="email_ph" placeholder="请输入邮箱"></div>
        <div><label class="text-sm font-medium" data-i18n="password">密码</label><input id="password" type="password" class="w-full border rounded-lg px-3 py-2 mt-1" data-i18n-placeholder="password_ph" placeholder="请输入密码"></div>
        <div><label class="text-sm font-medium" data-i18n="confirm">确认密码</label><input id="confirm" type="password" class="w-full border rounded-lg px-3 py-2 mt-1" data-i18n-placeholder="confirm_ph" placeholder="请再次输入密码"></div>
        <button class="w-full btn btn-primary py-3" type="submit" data-i18n="submit">注册并登录</button>
      </form>
      <p class="text-sm text-center text-slate-600 mt-6"><span data-i18n="has_account">已有账号？</span> <a href="login.html" class="text-blue-600" data-i18n="go_login">去登录</a></p>
    </div>
  </div>
<script>
const i18n={zh:{title:'创建 AdNova 账号',subtitle:'只需一分钟，马上开始 AI 广告增长',email:'邮箱',password:'密码',confirm:'确认密码',email_ph:'请输入邮箱',password_ph:'请输入密码（至少6位）',confirm_ph:'请再次输入密码',submit:'注册并登录',has_account:'已有账号？',go_login:'去登录',invalid_email:'请输入有效邮箱格式',invalid_password:'密码长度至少为6位',password_mismatch:'两次输入的密码不一致',user_exists:'该邮箱已注册，请直接登录',register_fail:'注册失败，请稍后再试'},en:{title:'Create your AdNova account',subtitle:'Start growing with AI ads in one minute.',email:'Email',password:'Password',confirm:'Confirm Password',email_ph:'Enter your email',password_ph:'Enter password (min 6 chars)',confirm_ph:'Re-enter your password',submit:'Sign up and continue',has_account:'Already have an account?',go_login:'Go to login',invalid_email:'Please enter a valid email address',invalid_password:'Password must be at least 6 characters',password_mismatch:'Passwords do not match',user_exists:'This email is already registered',register_fail:'Registration failed. Please try again.'},ms:{title:'Cipta akaun AdNova',subtitle:'Hanya seminit untuk mula berkembang dengan iklan AI.',email:'E-mel',password:'Kata laluan',confirm:'Sahkan Kata Laluan',email_ph:'Masukkan e-mel anda',password_ph:'Masukkan kata laluan (min 6 aksara)',confirm_ph:'Masukkan semula kata laluan',submit:'Daftar dan teruskan',has_account:'Sudah ada akaun?',go_login:'Pergi log masuk',invalid_email:'Sila masukkan e-mel yang sah',invalid_password:'Kata laluan minimum 6 aksara',password_mismatch:'Kata laluan tidak sepadan',user_exists:'E-mel ini sudah didaftarkan',register_fail:'Pendaftaran gagal. Sila cuba lagi.'}};
const $=s=>document.querySelector(s);const langSel=$('#language-switcher');
function lang(){return localStorage.getItem('adnova_lang')||'zh'};function t(k){return i18n[lang()][k]||k}
function applyLang(){langSel.value=lang();document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));document.documentElement.lang=lang()==='zh'?'zh-CN':lang();}
langSel.addEventListener('change',e=>{localStorage.setItem('adnova_lang',e.target.value);applyLang();});applyLang();
function showError(message){const box=$('#error-box');box.textContent=message;box.classList.remove('hidden');}
$('#register-form').addEventListener('submit',e=>{e.preventDefault();$('#error-box').classList.add('hidden');const email=$('#email').value.trim().toLowerCase();const password=$('#password').value;const confirm=$('#confirm').value;if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return showError(t('invalid_email'));if(password.length<6)return showError(t('invalid_password'));if(password!==confirm)return showError(t('password_mismatch'));const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');if(users.some(u=>u.email===email))return showError(t('user_exists'));try{users.push({email,password,plan:'free'});localStorage.setItem('adnova_users',JSON.stringify(users));localStorage.setItem('adnova_current_user',email);window.location.href='dashboard.html';}catch(_){showError(t('register_fail'));}});
</script>
</body></html>
