<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>注册 AdNova</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="styles.css"></head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md card p-8">
    <h1 class="text-3xl font-bold text-center" data-i18n="title"></h1>
    <p class="muted text-center mt-2" data-i18n="subtitle"></p>
    <div id="feedback" class="hidden feedback"></div>
    <form id="register-form" class="space-y-4 mt-6">
      <div><label class="text-sm font-medium" data-i18n="email"></label><input id="email" type="email" class="form-control mt-1" data-i18n-placeholder="email_ph"></div>
      <div><label class="text-sm font-medium" data-i18n="password"></label><input id="password" type="password" class="form-control mt-1" data-i18n-placeholder="password_ph"></div>
      <div><label class="text-sm font-medium" data-i18n="confirm"></label><input id="confirm" type="password" class="form-control mt-1" data-i18n-placeholder="confirm_ph"></div>
      <button id="submit-btn" class="w-full btn btn-primary" type="submit" data-i18n="submit"></button>
    </form>
    <p class="text-sm text-center muted mt-6"><span data-i18n="has_account"></span> <a href="login.html" class="text-blue-400" data-i18n="go_login"></a></p>
  </div>
<script>
const i18n={zh:{title:'创建 AdNova 账号',subtitle:'只需一分钟，马上开始 AI 广告增长',email:'邮箱',password:'密码',confirm:'确认密码',email_ph:'请输入邮箱',password_ph:'请输入密码（至少6位）',confirm_ph:'请再次输入密码',submit:'注册并登录',submitting:'注册中...',has_account:'已有账号？',go_login:'去登录',invalid_email:'请输入有效邮箱格式',invalid_password:'密码长度至少为6位',password_mismatch:'两次输入的密码不一致',user_exists:'该邮箱已注册，请直接登录',success:'注册成功，正在跳转...'},en:{title:'Create your AdNova account',subtitle:'Start growing with AI ads in one minute.',email:'Email',password:'Password',confirm:'Confirm Password',email_ph:'Enter your email',password_ph:'Enter password (min 6 chars)',confirm_ph:'Re-enter your password',submit:'Sign up and continue',submitting:'Creating account...',has_account:'Already have an account?',go_login:'Go to login',invalid_email:'Please enter a valid email',invalid_password:'Password must be at least 6 characters',password_mismatch:'Passwords do not match',user_exists:'This email is already registered',success:'Registration successful, redirecting...'}};
const $=s=>document.querySelector(s);function detectLang(){const s=localStorage.getItem('adnova_lang');if(s)return s;return (navigator.language||'en').toLowerCase().startsWith('zh')?'zh':'en';}
function lang(){return detectLang()} function t(k){return i18n[lang()][k]||i18n.zh[k]||k}
function applyLang(){localStorage.setItem('adnova_lang',lang());document.documentElement.lang=lang()==='zh'?'zh-CN':'en';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));}
function show(msg,type='error'){const box=$('#feedback');box.className=`feedback ${type}`;box.textContent=msg;box.classList.remove('hidden');}
async function hashPassword(password){const enc=new TextEncoder().encode(password);const digest=await crypto.subtle.digest('SHA-256',enc);return [...new Uint8Array(digest)].map(b=>b.toString(16).padStart(2,'0')).join('');}
applyLang();
$('#register-form').addEventListener('submit',async e=>{e.preventDefault();$('#feedback').classList.add('hidden');const btn=$('#submit-btn');btn.disabled=true;btn.textContent=t('submitting');try{const email=$('#email').value.trim().toLowerCase();const password=$('#password').value;const confirm=$('#confirm').value;if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return show(t('invalid_email'));if(password.length<6)return show(t('invalid_password'));if(password!==confirm)return show(t('password_mismatch'));const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');if(users.some(u=>u.email===email))return show(t('user_exists'));users.push({email,passwordHash:await hashPassword(password),plan:'free',createdAt:new Date().toISOString()});localStorage.setItem('adnova_users',JSON.stringify(users));localStorage.setItem('adnova_current_user',email);show(t('success'),'success');setTimeout(()=>window.location.href='dashboard.html',700);}finally{btn.disabled=false;btn.textContent=t('submit');}});
</script>
</body></html>
