<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdNova | AI 广告自动化平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="border-b border-slate-800/80 bg-[#0b0f14]/95 sticky top-0 z-50 backdrop-blur">
    <div class="container py-5 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold text-blue-500">AdNova</a>
      <div class="flex gap-3">
        <a href="login.html" class="btn btn-outline" data-i18n="nav_login">登录</a>
        <a href="register.html" class="btn btn-primary" data-i18n="nav_register">注册</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section text-center">
      <h1 class="text-4xl md:text-6xl font-bold leading-tight max-w-4xl mx-auto" data-i18n="hero_title">让不会做广告的商家，也能快速生成并发布广告</h1>
      <p class="muted text-lg mt-6 max-w-3xl mx-auto" data-i18n="hero_subtitle">填写你的业务信息，系统自动生成广告文案、图片建议与视频脚本，并可一键发布。</p>
      <div class="mt-10 flex justify-center gap-4 flex-wrap">
        <a href="register.html" class="btn btn-primary px-8" data-i18n="cta_start">开始使用</a>
        <a href="generate.html" class="btn btn-outline px-8" data-i18n="cta_generate">查看生成示例</a>
      </div>
    </section>

    <section class="section pt-0" id="features">
      <h2 class="text-3xl font-semibold text-center" data-i18n="features_title">核心功能</h2>
      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 mt-10">
        <article class="card p-6"><h3 class="font-semibold" data-i18n="f1_title"></h3><p class="muted mt-2" data-i18n="f1_desc"></p></article>
        <article class="card p-6"><h3 class="font-semibold" data-i18n="f2_title"></h3><p class="muted mt-2" data-i18n="f2_desc"></p></article>
        <article class="card p-6"><h3 class="font-semibold" data-i18n="f3_title"></h3><p class="muted mt-2" data-i18n="f3_desc"></p></article>
        <article class="card p-6"><h3 class="font-semibold" data-i18n="f4_title"></h3><p class="muted mt-2" data-i18n="f4_desc"></p></article>
      </div>
    </section>

    <section class="section pt-0">
      <h2 class="text-3xl font-semibold text-center" data-i18n="steps_title">3步完成</h2>
      <div class="grid md:grid-cols-3 gap-4 mt-10">
        <article class="card p-6"><p class="text-xs text-blue-400 font-semibold">STEP 1</p><h3 class="font-semibold mt-2" data-i18n="s1"></h3></article>
        <article class="card p-6"><p class="text-xs text-blue-400 font-semibold">STEP 2</p><h3 class="font-semibold mt-2" data-i18n="s2"></h3></article>
        <article class="card p-6"><p class="text-xs text-blue-400 font-semibold">STEP 3</p><h3 class="font-semibold mt-2" data-i18n="s3"></h3></article>
      </div>
    </section>

    <section class="section pt-0 pb-24">
      <h2 class="text-3xl font-semibold text-center" data-i18n="example_title">生成示例</h2>
      <div class="card p-8 mt-10 max-w-4xl mx-auto">
        <p class="muted" data-i18n="example_headline"></p>
        <p class="mt-4" data-i18n="example_copy"></p>
        <p class="mt-4" data-i18n="example_image"></p>
        <p class="mt-4" data-i18n="example_script"></p>
      </div>
    </section>
  </main>
<script>
const i18n={zh:{nav_login:'登录',nav_register:'注册',hero_title:'让不会做广告的商家，也能快速生成并发布广告',hero_subtitle:'填写你的业务信息，系统自动生成广告文案、图片建议与视频脚本，并可一键发布。',cta_start:'开始使用',cta_generate:'查看生成示例',features_title:'核心功能',f1_title:'AI 生成广告内容',f1_desc:'自动输出标题、文案与视频脚本，直接可用。',f2_title:'智能广告设置',f2_desc:'推荐人群、预算与渠道，减少试错成本。',f3_title:'一键发布到 Meta',f3_desc:'无需进入 Ads Manager，直接发布广告。',f4_title:'实时数据分析',f4_desc:'追踪点击、私信与转化，快速迭代。',steps_title:'3步完成',s1:'填写业务信息',s2:'AI 生成广告资产',s3:'一键发布并查看数据',example_title:'生成广告示例',example_headline:'标题：3天亮白体验，首单立减 RM50',example_copy:'文案：限时体验价，天然成分护理方案，适合忙碌上班族。现在预约即可获得免费肌肤检测。',example_image:'图片建议：门店真实对比图 + 温暖灯光 + 品牌角标。',example_script:'视频脚本：前3秒展示前后效果，10秒介绍优惠，最后5秒加入立即私信 CTA。'},en:{nav_login:'Login',nav_register:'Sign up',hero_title:'Launch better ads fast, even without ad experience',hero_subtitle:'Share business details and AdNova generates copy, image guidance and video script in seconds.',cta_start:'Get started',cta_generate:'See generated sample',features_title:'Core Features',f1_title:'AI ad content',f1_desc:'Headlines, copy and scripts ready to publish.',f2_title:'Smart setup',f2_desc:'Audience, budget and channel suggestions.',f3_title:'One-click Meta publish',f3_desc:'Publish without opening Ads Manager.',f4_title:'Realtime analytics',f4_desc:'Track clicks, leads and conversion.',steps_title:'Done in 3 steps',s1:'Fill business info',s2:'Generate ad assets',s3:'Publish and analyze',example_title:'Generated ad example',example_headline:'Headline: Brighter skin in 3 days, RM50 off first visit',example_copy:'Copy: Limited-time treatment with natural ingredients for busy professionals. Book now for a free skin check.',example_image:'Image: before/after store photos + warm lighting + brand corner tag.',example_script:'Video: 3s transformation, 10s offer, final 5s message CTA.'}};
function detectLang(){const saved=localStorage.getItem('adnova_lang');if(saved)return saved;const n=(navigator.language||'en').toLowerCase();if(n.startsWith('zh'))return 'zh';return 'en';}
function applyLang(){const lang=detectLang();localStorage.setItem('adnova_lang',lang);document.documentElement.lang=lang==='zh'?'zh-CN':'en';document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;el.textContent=i18n[lang][k]||i18n.zh[k]||k;});}
applyLang();
</script>
</body>
</html>
