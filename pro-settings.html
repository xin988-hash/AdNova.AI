<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>套餐与账单 - AdNova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50">
<div class="min-h-screen max-w-6xl mx-auto px-6 py-8">
  <header class="flex items-center justify-between mb-6">
    <div><h1 class="text-3xl font-bold" data-i18n="title">套餐与账单</h1><p class="text-slate-600" data-i18n="subtitle">管理当前套餐并随时升级</p></div>
    <div class="flex items-center gap-2"><select id="language-switcher" class="border rounded-lg px-3 py-2 text-sm"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><a href="dashboard.html" class="btn btn-outline" data-i18n="back">返回控制台</a></div>
  </header>

  <section id="billing" class="card p-6 mb-6">
    <p class="text-sm text-slate-500" data-i18n="current">当前套餐</p>
    <p id="current-plan" class="text-2xl font-bold mt-1">FREE</p>
  </section>

  <section class="grid md:grid-cols-3 gap-5">
    <article class="card p-6"><h3 class="font-bold text-xl">Free / Basic</h3><p class="text-3xl font-bold mt-3">RM0<span class="text-base text-slate-500" data-i18n="pm">/月</span></p><ul class="text-sm text-slate-600 mt-3 space-y-2"><li data-i18n="f1">每月有限生成次数</li><li data-i18n="f2">不含发布功能</li></ul><button data-plan="free" class="plan-btn btn btn-outline btn-block mt-5" data-i18n="choose">选择</button></article>
    <article class="card p-6 border-2 border-blue-600"><h3 class="font-bold text-xl">Pro</h3><p class="text-3xl font-bold mt-3">RM99<span class="text-base text-slate-500" data-i18n="pm">/月</span></p><ul class="text-sm text-slate-600 mt-3 space-y-2"><li data-i18n="p1">AI生成</li><li data-i18n="p2">一键发布到 Meta</li><li data-i18n="p3">数据分析</li></ul><button data-plan="pro" class="plan-btn btn btn-primary btn-block mt-5" data-i18n="upgrade">升级</button></article>
    <article class="card p-6"><h3 class="font-bold text-xl">Professional</h3><p class="text-3xl font-bold mt-3">RM199<span class="text-base text-slate-500" data-i18n="pm">/月</span></p><ul class="text-sm text-slate-600 mt-3 space-y-2"><li data-i18n="pp1">全部功能</li><li data-i18n="pp2">自动 Bot 部署</li><li data-i18n="pp3">更高级分析</li></ul><button data-plan="professional" class="plan-btn btn btn-outline btn-block mt-5" data-i18n="upgrade">升级</button></article>
  </section>
</div>
<script>
const i18n={zh:{title:'套餐与账单',subtitle:'管理当前套餐并随时升级',back:'返回控制台',current:'当前套餐',pm:'/月',f1:'每月有限生成次数',f2:'不含发布功能',p1:'AI生成',p2:'一键发布到 Meta',p3:'数据分析',pp1:'全部功能',pp2:'自动 Bot 部署',pp3:'更高级分析',choose:'选择',upgrade:'升级',updated:'套餐已更新'},en:{title:'Plans & Billing',subtitle:'Manage your current plan and upgrade anytime',back:'Back to dashboard',current:'Current Plan',pm:'/month',f1:'Limited monthly generations',f2:'No publishing feature',p1:'AI generation',p2:'One-click publishing to Meta',p3:'Performance analytics',pp1:'All features',pp2:'Automated bot deployment',pp3:'Advanced analytics',choose:'Select',upgrade:'Upgrade',updated:'Plan updated successfully'},ms:{title:'Pelan & Bil',subtitle:'Urus pelan semasa dan naik taraf bila-bila masa',back:'Kembali ke papan pemuka',current:'Pelan Semasa',pm:'/bulan',f1:'Had penjanaan bulanan',f2:'Tiada fungsi penerbitan',p1:'Penjanaan AI',p2:'Terbit ke Meta satu klik',p3:'Analitik prestasi',pp1:'Semua ciri',pp2:'Deploy bot automatik',pp3:'Analitik lanjutan',choose:'Pilih',upgrade:'Naik taraf',updated:'Pelan berjaya dikemas kini'}};
const $=s=>document.querySelector(s);const langSel=$('#language-switcher');const email=localStorage.getItem('adnova_current_user');if(!email) window.location.href='login.html';
const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');let me=users.find(u=>u.email===email);if(!me){me={email,password:'',plan:'free'};users.push(me);localStorage.setItem('adnova_users',JSON.stringify(users));}
function lang(){return localStorage.getItem('adnova_lang')||'zh'};function t(k){return i18n[lang()][k]||k}
function applyLang(){langSel.value=lang();document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.documentElement.lang=lang()==='zh'?'zh-CN':lang();}
function refreshPlan(){document.getElementById('current-plan').textContent=(me.plan||'free').toUpperCase();}
langSel.addEventListener('change',e=>{localStorage.setItem('adnova_lang',e.target.value);applyLang();});applyLang();refreshPlan();
document.querySelectorAll('.plan-btn').forEach(btn=>btn.addEventListener('click',()=>{me.plan=btn.dataset.plan;localStorage.setItem('adnova_users',JSON.stringify(users));refreshPlan();alert(t('updated'));}));
</script>
</body></html>
