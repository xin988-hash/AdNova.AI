<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AdNova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50">
<div class="min-h-screen max-w-6xl mx-auto px-6 py-8">
  <header class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <div>
      <h1 class="text-3xl font-bold" data-i18n="title">控制台</h1>
      <p class="text-slate-600" data-i18n="subtitle">欢迎回来，查看你的广告进展</p>
    </div>
    <div class="flex items-center gap-2">
      <select id="language-switcher" class="border rounded-lg px-3 py-2 text-sm"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select>
      <a href="index.html" class="btn btn-outline" data-i18n="home">首页</a>
      <button id="logout" class="btn btn-outline" data-i18n="logout">退出</button>
    </div>
  </header>

  <section class="card p-5 mb-6 flex flex-wrap items-center justify-between gap-4">
    <div>
      <p class="text-sm text-slate-500" data-i18n="current_plan">当前套餐</p>
      <p class="text-xl font-bold" id="plan-label">Free</p>
    </div>
    <a href="pro-settings.html#billing" class="btn btn-primary" data-i18n="upgrade">升级套餐</a>
  </section>

  <section class="grid md:grid-cols-3 gap-5">
    <a href="generate.html" class="card p-6 hover:shadow-md"><h3 class="font-semibold" data-i18n="gen">生成广告内容</h3><p class="text-sm text-slate-600 mt-2" data-i18n="gen_desc">快速生成标题、文案、视频脚本</p></a>
    <a href="publish.html" class="card p-6 hover:shadow-md"><h3 class="font-semibold" data-i18n="publish">发布广告</h3><p class="text-sm text-slate-600 mt-2" data-i18n="publish_desc">连接 Meta 后一键发布</p></a>
    <a href="pro-settings.html" class="card p-6 hover:shadow-md"><h3 class="font-semibold" data-i18n="settings">设置中心</h3><p class="text-sm text-slate-600 mt-2" data-i18n="settings_desc">管理套餐、账单和高级功能</p></a>
  </section>
</div>
<script>
const i18n={zh:{title:'控制台',subtitle:'欢迎回来，查看你的广告进展',home:'首页',logout:'退出',current_plan:'当前套餐',upgrade:'升级套餐',gen:'生成广告内容',gen_desc:'快速生成标题、文案、视频脚本',publish:'发布广告',publish_desc:'连接 Meta 后一键发布',settings:'设置中心',settings_desc:'管理套餐、账单和高级功能'},en:{title:'Dashboard',subtitle:'Welcome back. Track your ad performance.',home:'Home',logout:'Logout',current_plan:'Current plan',upgrade:'Upgrade',gen:'Generate Ad Content',gen_desc:'Create headlines, copy, and video scripts instantly',publish:'Publish Ads',publish_desc:'Connect Meta and publish in one click',settings:'Settings',settings_desc:'Manage plans, billing, and advanced features'},ms:{title:'Papan Pemuka',subtitle:'Selamat kembali. Pantau prestasi iklan anda.',home:'Laman Utama',logout:'Log keluar',current_plan:'Pelan semasa',upgrade:'Naik taraf',gen:'Jana Kandungan Iklan',gen_desc:'Jana tajuk, salinan dan skrip video dengan cepat',publish:'Terbit Iklan',publish_desc:'Sambung Meta dan terbit satu klik',settings:'Tetapan',settings_desc:'Urus pelan, bil dan ciri lanjutan'}};
const $=s=>document.querySelector(s);const langSel=$('#language-switcher');
const email=localStorage.getItem('adnova_current_user');
if(!email) window.location.href='login.html';
const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');
const me=users.find(u=>u.email===email)||{plan:'free'};
$('#plan-label').textContent=(me.plan||'free').toUpperCase();
function lang(){return localStorage.getItem('adnova_lang')||'zh'};function t(k){return i18n[lang()][k]||k}
function applyLang(){langSel.value=lang();document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.documentElement.lang=lang()==='zh'?'zh-CN':lang();}
langSel.addEventListener('change',e=>{localStorage.setItem('adnova_lang',e.target.value);applyLang();});applyLang();
$('#logout').addEventListener('click',()=>{localStorage.removeItem('adnova_current_user');window.location.href='login.html';});
</script>
</body></html>
