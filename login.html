<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>登录 AdNova</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="styles.css"></head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md card p-8">
    <h1 class="text-3xl font-bold text-center" data-i18n="title"></h1>
    <p class="muted text-center mt-2" data-i18n="subtitle"></p>
    <div id="feedback" class="hidden feedback"></div>
    <form id="login-form" class="space-y-4 mt-6">
      <div><label class="text-sm font-medium" data-i18n="email"></label><input id="email" type="email" class="form-control mt-1" data-i18n-placeholder="email_ph"></div>
      <div><label class="text-sm font-medium" data-i18n="password"></label><input id="password" type="password" class="form-control mt-1" data-i18n-placeholder="password_ph"></div>
      <button id="submit-btn" class="w-full btn btn-primary" type="submit" data-i18n="submit"></button>
    </form>
    <p class="text-sm text-center muted mt-6"><span data-i18n="no_account"></span> <a href="register.html" class="text-blue-400" data-i18n="go_register"></a></p>
  </div>
<script>
const i18n={zh:{title:'登录 AdNova',subtitle:'欢迎回来，继续创建你的广告',email:'邮箱',password:'密码',email_ph:'请输入邮箱',password_ph:'请输入密码',submit:'登录',submitting:'登录中...',no_account:'还没有账号？',go_register:'立即注册',invalid_email:'请输入有效邮箱格式',invalid_password:'密码长度至少为6位',not_found:'用户不存在，请先注册',wrong_password:'密码错误，请重试',success:'登录成功，正在跳转...'},en:{title:'Login to AdNova',subtitle:'Welcome back. Keep your ads growing.',email:'Email',password:'Password',email_ph:'Enter your email',password_ph:'Enter your password',submit:'Log in',submitting:'Signing in...',no_account:'No account yet?',go_register:'Sign up now',invalid_email:'Please enter a valid email',invalid_password:'Password must be at least 6 characters',not_found:'Account not found, please sign up',wrong_password:'Wrong password, please try again',success:'Login successful, redirecting...'}};
const $=s=>document.querySelector(s);function detectLang(){const s=localStorage.getItem('adnova_lang');if(s)return s;return (navigator.language||'en').toLowerCase().startsWith('zh')?'zh':'en';}
function lang(){return detectLang()} function t(k){return i18n[lang()][k]||i18n.zh[k]||k}
function applyLang(){localStorage.setItem('adnova_lang',lang());document.documentElement.lang=lang()==='zh'?'zh-CN':'en';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));}
function show(msg,type='error'){const box=$('#feedback');box.className=`feedback ${type}`;box.textContent=msg;box.classList.remove('hidden');}
async function hashPassword(password){const enc=new TextEncoder().encode(password);const digest=await crypto.subtle.digest('SHA-256',enc);return [...new Uint8Array(digest)].map(b=>b.toString(16).padStart(2,'0')).join('');}
applyLang();
$('#login-form').addEventListener('submit',async e=>{e.preventDefault();$('#feedback').classList.add('hidden');const btn=$('#submit-btn');btn.disabled=true;btn.textContent=t('submitting');try{const email=$('#email').value.trim().toLowerCase();const password=$('#password').value;if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return show(t('invalid_email'));if(password.length<6)return show(t('invalid_password'));const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');const found=users.find(u=>u.email===email);if(!found)return show(t('not_found'));const hashed=await hashPassword(password);const valid=found.passwordHash?found.passwordHash===hashed:found.password===password;if(!valid)return show(t('wrong_password'));if(!found.passwordHash){found.passwordHash=hashed;delete found.password;localStorage.setItem('adnova_users',JSON.stringify(users));}localStorage.setItem('adnova_current_user',email);show(t('success'),'success');setTimeout(()=>window.location.href='dashboard.html',700);}finally{btn.disabled=false;btn.textContent=t('submit');}});
</script>
</body></html>
