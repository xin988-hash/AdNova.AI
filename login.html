<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 AdNova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-right mb-3"><select id="language-switcher" class="border rounded-lg px-3 py-2 text-sm"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div>
    <div class="bg-white rounded-2xl shadow p-8">
      <h1 class="text-2xl font-bold text-center" data-i18n="title">登录 AdNova</h1>
      <p class="text-slate-600 text-center mt-2" data-i18n="subtitle">欢迎回来，继续创建你的广告</p>
      <div id="error-box" class="hidden mt-4 rounded-lg bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm"></div>
      <form id="login-form" class="space-y-4 mt-6">
        <div><label class="text-sm font-medium" data-i18n="email">邮箱</label><input id="email" type="email" class="w-full border rounded-lg px-3 py-2 mt-1" data-i18n-placeholder="email_ph" placeholder="请输入邮箱"></div>
        <div><label class="text-sm font-medium" data-i18n="password">密码</label><input id="password" type="password" class="w-full border rounded-lg px-3 py-2 mt-1" data-i18n-placeholder="password_ph" placeholder="请输入密码"></div>
        <button class="w-full btn btn-primary py-3" type="submit" data-i18n="submit">登录</button>
      </form>
      <p class="text-sm text-center text-slate-600 mt-6"><span data-i18n="no_account">还没有账号？</span> <a href="register.html" class="text-blue-600" data-i18n="go_register">立即注册</a></p>
    </div>
  </div>
<script>
const i18n={zh:{title:'登录 AdNova',subtitle:'欢迎回来，继续创建你的广告',email:'邮箱',password:'密码',email_ph:'请输入邮箱',password_ph:'请输入密码',submit:'登录',no_account:'还没有账号？',go_register:'立即注册',invalid_email:'请输入有效邮箱格式',invalid_password:'密码长度至少为6位',not_found:'用户不存在，请先注册',wrong_password:'邮箱或密码错误'},en:{title:'Log in to AdNova',subtitle:'Welcome back. Let’s keep your ads growing.',email:'Email',password:'Password',email_ph:'Enter your email',password_ph:'Enter your password',submit:'Log in',no_account:'No account yet?',go_register:'Sign up now',invalid_email:'Please enter a valid email address',invalid_password:'Password must be at least 6 characters',not_found:'Account not found. Please sign up first.',wrong_password:'Invalid email or password'},ms:{title:'Log masuk AdNova',subtitle:'Selamat kembali. Teruskan bina iklan anda.',email:'E-mel',password:'Kata laluan',email_ph:'Masukkan e-mel anda',password_ph:'Masukkan kata laluan',submit:'Log masuk',no_account:'Belum ada akaun?',go_register:'Daftar sekarang',invalid_email:'Sila masukkan e-mel yang sah',invalid_password:'Kata laluan minimum 6 aksara',not_found:'Pengguna tidak ditemui. Sila daftar dahulu.',wrong_password:'E-mel atau kata laluan tidak tepat'}};
const $=s=>document.querySelector(s);const langSel=$('#language-switcher');
function lang(){return localStorage.getItem('adnova_lang')||'zh'}
function t(k){return i18n[lang()][k]||k}
function applyLang(){langSel.value=lang();document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));document.documentElement.lang=lang()==='zh'?'zh-CN':lang();}
langSel.addEventListener('change',e=>{localStorage.setItem('adnova_lang',e.target.value);applyLang();});applyLang();
function showError(message){const box=$('#error-box');box.textContent=message;box.classList.remove('hidden');}
$('#login-form').addEventListener('submit',e=>{e.preventDefault();$('#error-box').classList.add('hidden');const email=$('#email').value.trim().toLowerCase();const password=$('#password').value;const validEmail=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);if(!validEmail)return showError(t('invalid_email'));if(password.length<6)return showError(t('invalid_password'));const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');const found=users.find(u=>u.email===email);if(!found)return showError(t('not_found'));if(found.password!==password)return showError(t('wrong_password'));localStorage.setItem('adnova_current_user',email);window.location.href='dashboard.html';});
</script>
</body></html>
