<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布 - AdNova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50">
<div class="min-h-screen max-w-5xl mx-auto px-6 py-8">
  <header class="flex items-center justify-between mb-6">
    <div><h1 class="text-3xl font-bold" data-i18n="title">发布广告</h1><p class="text-slate-600" data-i18n="subtitle">将生成内容发布到 Meta 账号</p></div>
    <div class="flex items-center gap-2"><select id="language-switcher" class="border rounded-lg px-3 py-2 text-sm"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><a href="dashboard.html" class="btn btn-outline" data-i18n="back">返回控制台</a></div>
  </header>

  <div id="limit-banner" class="hidden mb-4 rounded-lg border border-amber-200 bg-amber-50 text-amber-800 p-4"></div>

  <section class="card p-6">
    <label class="block text-sm font-medium mb-2" data-i18n="content">广告内容</label>
    <textarea class="w-full border rounded-lg p-3" rows="6" data-i18n-placeholder="content_ph" placeholder="粘贴你要发布的文案"></textarea>
    <button id="publish-btn" class="btn btn-primary mt-4" data-i18n="publish">立即发布</button>
  </section>
</div>
<script>
const i18n={zh:{title:'发布广告',subtitle:'将生成内容发布到 Meta 账号',back:'返回控制台',content:'广告内容',content_ph:'粘贴你要发布的文案',publish:'立即发布',limited:'此功能仅限 Pro 及以上用户',upgrade:'升级后可一键发布到 Meta。',publish_success:'发布成功（演示）'},en:{title:'Publish Ads',subtitle:'Send generated content to your Meta account',back:'Back to dashboard',content:'Ad Content',content_ph:'Paste the ad copy you want to publish',publish:'Publish now',limited:'This feature is available for Pro and above only',upgrade:'Upgrade to publish to Meta in one click.',publish_success:'Published successfully (demo)'},ms:{title:'Terbit Iklan',subtitle:'Terbit kandungan ke akaun Meta anda',back:'Kembali ke papan pemuka',content:'Kandungan Iklan',content_ph:'Tampal salinan iklan untuk diterbitkan',publish:'Terbit sekarang',limited:'Ciri ini hanya untuk pengguna Pro dan ke atas',upgrade:'Naik taraf untuk terbit ke Meta dengan satu klik.',publish_success:'Berjaya diterbitkan (demo)'}};
const $=s=>document.querySelector(s);const langSel=$('#language-switcher');
const email=localStorage.getItem('adnova_current_user');if(!email) window.location.href='login.html';
const users=JSON.parse(localStorage.getItem('adnova_users')||'[]');const me=users.find(u=>u.email===email)||{plan:'free'};
function lang(){return localStorage.getItem('adnova_lang')||'zh'};function t(k){return i18n[lang()][k]||k}
function applyLang(){langSel.value=lang();document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));document.documentElement.lang=lang()==='zh'?'zh-CN':lang();if(me.plan==='free'){$('#limit-banner').textContent=`${t('limited')} ${t('upgrade')}`;$('#limit-banner').classList.remove('hidden');}}
langSel.addEventListener('change',e=>{localStorage.setItem('adnova_lang',e.target.value);applyLang();});applyLang();
$('#publish-btn').addEventListener('click',()=>{if(me.plan==='free'){alert(t('limited'));window.location.href='pro-settings.html#billing';return;}alert(t('publish_success'));});
</script>
</body></html>
